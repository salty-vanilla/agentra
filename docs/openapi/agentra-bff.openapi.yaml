openapi: 3.0.3
info:
  title: Agentra BFF API
  version: 0.1.0
  description: |
    Contract for the Agentra frontend-facing BFF.
    This spec is the source of truth for frontend client generation and API mocks.
servers:
  - url: http://127.0.0.1:8787
    description: Local backend
tags:
  - name: health
  - name: threads
  - name: chat
  - name: admin
  - name: knowledge-base
paths:
  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Get backend health
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /chat:
    post:
      operationId: postChat
      tags: [chat]
      summary: Send a chat message to the agent backend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Agent reply stream (SSE)
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Each line is `data: <json>`.
                  JSON payload is one of ChatStreamTextEvent, ChatStreamProgressSummaryEvent,
                  ChatStreamSubAgentProgressEvent, ChatStreamObservationEvent,
                  ChatStreamArtifactEvent, ChatStreamDeckProgressEvent, ChatStreamDoneEvent,
                  ChatStreamErrorEvent.
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /threads:
    get:
      operationId: listThreads
      tags: [threads]
      summary: List chat threads
      responses:
        '200':
          description: Thread summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadsResponse'
    post:
      operationId: createThread
      tags: [threads]
      summary: Create a chat thread
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateThreadRequest'
      responses:
        '201':
          description: Created thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /threads/{threadId}:
    get:
      operationId: getThread
      tags: [threads]
      summary: Get a thread by id
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      responses:
        '200':
          description: Thread summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: updateThread
      tags: [threads]
      summary: Update a thread by id
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateThreadRequest'
      responses:
        '200':
          description: Updated thread summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteThread
      tags: [threads]
      summary: Delete a thread by id
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      responses:
        '200':
          description: Deleted thread summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /threads/{threadId}/messages:
    get:
      operationId: listThreadMessages
      tags: [threads]
      summary: List messages in a thread
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      responses:
        '200':
          description: Thread messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadMessagesResponse'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /threads/{threadId}/artifacts:
    get:
      operationId: listThreadArtifacts
      tags: [threads]
      summary: List artifact manifests for a thread
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      responses:
        '200':
          description: Artifact manifests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadArtifactsResponse'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /threads/{threadId}/artifacts/{artifactId}/download-url:
    get:
      operationId: getArtifactDownloadUrl
      tags: [threads]
      summary: Get a fresh presigned download URL for an artifact
      parameters:
        - $ref: '#/components/parameters/ThreadId'
        - name: artifactId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Presigned download URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactDownloadUrlResponse'
        '404':
          description: Thread or artifact not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Artifact storage not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/observability/overview:
    get:
      operationId: getAdminOverview
      tags: [admin]
      summary: Get observability overview stats
      parameters:
        - $ref: '#/components/parameters/ObsFrom'
        - $ref: '#/components/parameters/ObsTo'
      responses:
        '200':
          description: Overview stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOverviewResponse'
        '400':
          description: Invalid date format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/observability/timeseries:
    get:
      operationId: getAdminTimeseries
      tags: [admin]
      summary: Get time-bucketed observability metrics
      parameters:
        - $ref: '#/components/parameters/ObsFrom'
        - $ref: '#/components/parameters/ObsTo'
        - name: bucket
          in: query
          schema:
            type: string
            enum: [hour, day]
            default: day
      responses:
        '200':
          description: Time-series buckets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTimeseriesResponse'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/observability/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: Get per-user observability stats
      parameters:
        - $ref: '#/components/parameters/ObsFrom'
        - $ref: '#/components/parameters/ObsTo'
        - $ref: '#/components/parameters/ObsLimit'
        - $ref: '#/components/parameters/ObsCursor'
      responses:
        '200':
          description: Per-user stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/observability/agents:
    get:
      operationId: getAdminAgents
      tags: [admin]
      summary: Get per-agent observability stats
      parameters:
        - $ref: '#/components/parameters/ObsFrom'
        - $ref: '#/components/parameters/ObsTo'
      responses:
        '200':
          description: Per-agent stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAgentsResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/observability/tools:
    get:
      operationId: getAdminTools
      tags: [admin]
      summary: Get per-tool observability stats
      parameters:
        - $ref: '#/components/parameters/ObsFrom'
        - $ref: '#/components/parameters/ObsTo'
      responses:
        '200':
          description: Per-tool stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminToolsResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/observability/skills:
    get:
      operationId: getAdminSkills
      tags: [admin]
      summary: Get per-skill observability stats
      parameters:
        - $ref: '#/components/parameters/ObsFrom'
        - $ref: '#/components/parameters/ObsTo'
      responses:
        '200':
          description: Per-skill stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSkillsResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/observability/traces:
    get:
      operationId: getAdminTraces
      tags: [admin]
      summary: List individual trace records
      parameters:
        - $ref: '#/components/parameters/ObsFrom'
        - $ref: '#/components/parameters/ObsTo'
        - $ref: '#/components/parameters/ObsStatus'
        - $ref: '#/components/parameters/ObsUserId'
        - $ref: '#/components/parameters/ObsLimit'
        - $ref: '#/components/parameters/ObsCursor'
      responses:
        '200':
          description: Trace list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTracesResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/observability/traces/{traceId}:
    get:
      operationId: getAdminTraceDetail
      tags: [admin]
      summary: Get full detail for a single trace
      parameters:
        - $ref: '#/components/parameters/TraceId'
      responses:
        '200':
          description: Trace detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTraceDetailResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trace not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users from UserTable
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/invite:
    post:
      operationId: inviteAdminUser
      tags: [admin]
      summary: Invite a new user via Cognito AdminCreateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteAdminUserRequest'
      responses:
        '201':
          description: User invited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteAdminUserResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/{sub}/promote-admin:
    post:
      operationId: promoteAdminUser
      tags: [admin]
      summary: Add user to the admin Cognito group
      parameters:
        - name: sub
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User promoted to admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserActionResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/{sub}/remove-admin:
    post:
      operationId: removeAdminUser
      tags: [admin]
      summary: Remove user from the admin Cognito group
      parameters:
        - name: sub
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Admin role removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserActionResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — self-demotion not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot remove the last enabled admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/{sub}/disable:
    post:
      operationId: disableAdminUser
      tags: [admin]
      summary: Disable a user via Cognito AdminDisableUser
      parameters:
        - name: sub
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserActionResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — self-disable not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/{sub}/enable:
    post:
      operationId: enableAdminUser
      tags: [admin]
      summary: Enable a user via Cognito AdminEnableUser
      parameters:
        - name: sub
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserActionResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/{sub}/resend-invite:
    post:
      operationId: resendAdminUserInvite
      tags: [admin]
      summary: Resend invitation email via Cognito AdminCreateUser RESEND
      parameters:
        - name: sub
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserActionResponse'
        '400':
          description: User has already activated their account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /knowledge-base/status:
    get:
      operationId: getKbStatus
      tags: [knowledge-base]
      summary: Get Knowledge Base configuration status
      responses:
        '200':
          description: KB status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KbStatusResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /knowledge-base/documents:
    get:
      operationId: listKbDocuments
      tags: [knowledge-base]
      summary: List documents in the KB S3 data source bucket
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            type: string
            description: Pagination token from a previous response
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KbDocumentsResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteKbDocument
      tags: [knowledge-base]
      summary: Delete a document from the KB S3 data source bucket
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            description: URL-encoded S3 object key
      responses:
        '204':
          description: Deleted successfully
        '400':
          description: Invalid or missing key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Document not found or key outside allowed prefix
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /knowledge-base/documents/presign:
    post:
      operationId: presignKbDocument
      tags: [knowledge-base]
      summary: Get a presigned S3 URL for uploading a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignDocumentRequest'
      responses:
        '200':
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignDocumentResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /knowledge-base/ingestion-jobs:
    get:
      operationId: listKbIngestionJobs
      tags: [knowledge-base]
      summary: List recent KB ingestion jobs (last 10)
      responses:
        '200':
          description: Ingestion job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionJobsResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /knowledge-base/sync:
    post:
      operationId: startKbSync
      tags: [knowledge-base]
      summary: Manually start a KB ingestion sync job
      responses:
        '200':
          description: Sync job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Knowledge Base is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sync already in progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TraceId:
      name: traceId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ObsFrom:
      name: from
      in: query
      required: false
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
    ObsTo:
      name: to
      in: query
      required: false
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
    ObsLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    ObsCursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    ObsStatus:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - success
          - error
          - cancelled
    ObsUserId:
      name: userId
      in: query
      required: false
      schema:
        type: string
  schemas:
    ChatRole:
      type: string
      enum:
        - system
        - user
        - assistant
    MessageRole:
      type: string
      enum:
        - user
        - assistant
    ChatMessage:
      type: object
      additionalProperties: false
      required:
        - role
        - content
      properties:
        role:
          $ref: '#/components/schemas/ChatRole'
        content:
          type: string
          minLength: 1
    ThreadSummary:
      type: object
      additionalProperties: false
      required:
        - threadId
        - title
        - createdAt
        - updatedAt
      properties:
        threadId:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        preview:
          type: string
    PersistedChatMessage:
      type: object
      additionalProperties: false
      required:
        - messageId
        - threadId
        - role
        - content
        - createdAt
      properties:
        messageId:
          type: string
          minLength: 1
        threadId:
          type: string
          minLength: 1
        role:
          $ref: '#/components/schemas/MessageRole'
        content:
          type: string
          minLength: 1
        createdAt:
          type: string
          format: date-time
        requestId:
          type: string
          minLength: 1
          description: Request ID for tracing across services
        errorMessage:
          type: string
          description: Error message if chat failed
        errorStack:
          type: string
          description: Truncated error stack trace if chat failed
        cancelledAt:
          type: string
          format: date-time
          description: ISO timestamp when chat was cancelled
        observabilitySummary:
          $ref: '#/components/schemas/ChatObservationSummary'
        artifactManifest:
          $ref: '#/components/schemas/ArtifactManifest'
    ChatCommand:
      type: object
      required:
        - type
        - topic
      properties:
        type:
          type: string
          enum:
            - create_slide_presentation
        topic:
          type: string
          minLength: 1
        audience:
          type: string
        purpose:
          type: string
        slideCount:
          oneOf:
            - type: integer
              minimum: 1
            - type: string
              enum:
                - auto
        durationMinutes:
