openapi: 3.0.3
info:
  title: Agentra BFF API
  version: 0.1.0
  description: |
    Contract for the Agentra frontend-facing BFF.
    This spec is the source of truth for frontend client generation and API mocks.
servers:
  - url: http://127.0.0.1:8787
    description: Local backend
tags:
  - name: health
  - name: threads
  - name: chat
paths:
  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Get backend health
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /chat:
    post:
      operationId: postChat
      tags: [chat]
      summary: Send a chat message to the agent backend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Agent reply stream (SSE)
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Each line is `data: <json>`.
                  JSON payload is one of ChatStreamTextEvent, ChatStreamProgressSummaryEvent,
                  ChatStreamObservationEvent, ChatStreamDoneEvent, ChatStreamErrorEvent.
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /threads:
    get:
      operationId: listThreads
      tags: [threads]
      summary: List chat threads
      responses:
        '200':
          description: Thread summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadsResponse'
    post:
      operationId: createThread
      tags: [threads]
      summary: Create a chat thread
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateThreadRequest'
      responses:
        '201':
          description: Created thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /threads/{threadId}:
    get:
      operationId: getThread
      tags: [threads]
      summary: Get a thread by id
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      responses:
        '200':
          description: Thread summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: updateThread
      tags: [threads]
      summary: Update a thread by id
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateThreadRequest'
      responses:
        '200':
          description: Updated thread summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteThread
      tags: [threads]
      summary: Delete a thread by id
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      responses:
        '200':
          description: Deleted thread summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /threads/{threadId}/messages:
    get:
      operationId: listThreadMessages
      tags: [threads]
      summary: List messages in a thread
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      responses:
        '200':
          description: Thread messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadMessagesResponse'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  schemas:
    ChatRole:
      type: string
      enum:
        - system
        - user
        - assistant
    MessageRole:
      type: string
      enum:
        - user
        - assistant
    ChatMessage:
      type: object
      additionalProperties: false
      required:
        - role
        - content
      properties:
        role:
          $ref: '#/components/schemas/ChatRole'
        content:
          type: string
          minLength: 1
    ThreadSummary:
      type: object
      additionalProperties: false
      required:
        - threadId
        - title
        - createdAt
        - updatedAt
      properties:
        threadId:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        preview:
          type: string
    PersistedChatMessage:
      type: object
      additionalProperties: false
      required:
        - messageId
        - threadId
        - role
        - content
        - createdAt
      properties:
        messageId:
          type: string
          minLength: 1
        threadId:
          type: string
          minLength: 1
        role:
          $ref: '#/components/schemas/MessageRole'
        content:
          type: string
          minLength: 1
        createdAt:
          type: string
          format: date-time
        observabilitySummary:
          $ref: '#/components/schemas/ChatObservationSummary'
    ChatCommand:
      type: object
      required:
        - type
        - topic
      properties:
        type:
          type: string
          enum:
            - create_slide_presentation
        topic:
          type: string
          minLength: 1
        audience:
          type: string
        purpose:
          type: string
        slideCount:
          oneOf:
            - type: integer
              minimum: 1
            - type: string
              enum:
                - auto
        durationMinutes:
          oneOf:
            - type: integer
              minimum: 1
            - type: string
              enum:
                - auto
        language:
          type: string
          enum:
            - ja
            - en
        tone:
          type: string
        outputFormat:
          type: string
          enum:
            - pptx
    ChatRequest:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        threadId:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        history:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          default: []
        model:
          type: string
          enum:
            - opus
            - sonnet
            - haiku
          default: sonnet
        command:
          $ref: '#/components/schemas/ChatCommand'
    ChatResponse:
      type: object
      additionalProperties: false
      required:
        - threadId
        - reply
        - model
        - createdAt
      properties:
        threadId:
          type: string
          minLength: 1
        reply:
          type: string
          minLength: 1
        model:
          type: string
          minLength: 1
        createdAt:
          type: string
          format: date-time
    ChatStreamTextEvent:
      type: object
      additionalProperties: false
      required:
        - type
        - text
      properties:
        type:
          type: string
          enum:
            - text
        text:
          type: string
    ProgressSummaryEvent:
      type: object
      additionalProperties: false
      required:
        - type
        - phase
        - title
        - summary
        - timestamp
      properties:
        type:
          type: string
          enum:
            - progress_summary
        phase:
          type: string
          enum:
            - request_understanding
            - router_handoff
            - outline
            - authoring
            - pptx_generation
            - rendering
            - diagnostics
            - revision
            - upload
            - done
            - error
        title:
          type: string
        summary:
          type: string
        details:
          type: array
          items:
            type: string
        timestamp:
          type: string
          format: date-time
    ChatStreamProgressSummaryEvent:
      type: object
      additionalProperties: false
      required:
        - type
        - event
      properties:
        type:
          type: string
          enum:
            - progress_summary
        event:
          $ref: '#/components/schemas/ProgressSummaryEvent'
    ChatObservationToolCall:
      type: object
      additionalProperties: false
      required:
        - toolName
        - startedAt
        - durationMs
        - status
      properties:
        toolName:
          type: string
          minLength: 1
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        durationMs:
          type: integer
          minimum: 0
        status:
          type: string
          enum:
            - success
            - error
            - cancelled
        error:
          type: string
          minLength: 1
    ChatObservationSummary:
      type: object
      additionalProperties: false
      required:
        - traceId
        - startedAt
        - completedAt
        - durationMs
        - status
        - toolCalls
        - toolCallCount
        - toolFailureCount
      properties:
        traceId:
          type: string
          minLength: 1
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        durationMs:
          type: integer
          minimum: 0
        status:
          type: string
          enum:
            - success
            - error
            - cancelled
        tokenUsage:
          type: object
          additionalProperties: false
          required:
            - inputTokens
            - outputTokens
            - totalTokens
          properties:
            inputTokens:
              type: integer
              minimum: 0
            outputTokens:
              type: integer
              minimum: 0
            totalTokens:
              type: integer
              minimum: 0
        reasoning:
          type: object
          additionalProperties: false
          required:
            - stepCount
          properties:
            stepCount:
              type: integer
              minimum: 0
            summary:
              type: string
        toolCalls:
          type: array
          items:
            $ref: '#/components/schemas/ChatObservationToolCall'
        toolCallCount:
          type: integer
          minimum: 0
        toolFailureCount:
          type: integer
          minimum: 0
    ChatStreamObservationEvent:
      type: object
      additionalProperties: false
      required:
        - type
        - observation
      properties:
        type:
          type: string
          enum:
            - observation
        observation:
          $ref: '#/components/schemas/ChatObservationSummary'
    ChatStreamDoneEvent:
      type: object
      additionalProperties: false
      required:
        - type
        - threadId
        - model
        - createdAt
      properties:
        type:
          type: string
          enum:
            - done
        threadId:
          type: string
          minLength: 1
        model:
          type: string
          minLength: 1
        createdAt:
          type: string
          format: date-time
        observabilitySummary:
          $ref: '#/components/schemas/ChatObservationSummary'
    ChatStreamErrorEvent:
      type: object
      additionalProperties: false
      required:
        - type
        - error
      properties:
        type:
          type: string
          enum:
            - error
        error:
          type: string
          minLength: 1
        observabilitySummary:
          $ref: '#/components/schemas/ChatObservationSummary'
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - version
        - timestamp
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          minLength: 1
        version:
          type: string
          minLength: 1
        timestamp:
          type: string
          format: date-time
    ThreadsResponse:
      type: object
      additionalProperties: false
      required:
        - threads
      properties:
        threads:
          type: array
          items:
            $ref: '#/components/schemas/ThreadSummary'
    ThreadResponse:
      type: object
      additionalProperties: false
      required:
        - thread
      properties:
        thread:
          $ref: '#/components/schemas/ThreadSummary'
    CreateThreadRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 1
    UpdateThreadRequest:
      type: object
      additionalProperties: false
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
    ThreadMessagesResponse:
      type: object
      additionalProperties: false
      required:
        - thread
        - messages
      properties:
        thread:
          $ref: '#/components/schemas/ThreadSummary'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/PersistedChatMessage'
    ErrorResponse:
      type: object
      additionalProperties: true
      required:
        - error
      properties:
        error:
          type: string
          minLength: 1
        details:
          type: object
