name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome check .

  build-packages:
    name: build-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build agent-tools (includes shared via tsc -b project references)
        run: pnpm --filter @agentra/agent-tools build
      - name: Build presentation-author
        run: pnpm --filter @agentra/presentation-author build
      - name: Pack package dist artifact
        run: |
          tar -czf packages-dist.tar.gz \
            packages/shared/dist \
            packages/agent-tools/dist \
            packages/presentation-author/dist
      - uses: actions/upload-artifact@v4
        with:
          name: packages-dist
          path: packages-dist.tar.gz
          retention-days: 1

  typecheck:
    name: typecheck / ${{ matrix.workspace }}
    needs: [build-packages]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - '@agentra/shared'
          - '@agentra/agent-tools'
          - '@agentra/presentation-author'
          - '@agentra/frontend'
          - '@agentra/backend'
          - '@agentra/agentcore-runtime-ts'
          - '@agentra/presentation-author-runtime'
          - '@agentra/infra-cdk'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: .
      - name: Extract package dist artifact
        run: tar -xzf packages-dist.tar.gz
      - run: pnpm --filter ${{ matrix.workspace }} typecheck

  test:
    name: test / ${{ matrix.workspace }}
    needs: [build-packages]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: '@agentra/frontend'
            sandbox: false
          - workspace: '@agentra/agent-tools'
            sandbox: false
          - workspace: '@agentra/presentation-author'
            sandbox: true
          - workspace: '@agentra/backend'
            sandbox: false
          - workspace: '@agentra/agentcore-runtime-ts'
            sandbox: false
          - workspace: '@agentra/presentation-author-runtime'
            sandbox: true
          - workspace: '@agentra/infra-cdk'
            sandbox: false
          - workspace: '@agentra/frontend'
            sandbox: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: .
      - name: Extract package dist artifact
        run: tar -xzf packages-dist.tar.gz
      - name: Install presentation-author sandbox runtime
        if: ${{ matrix.sandbox }}
        run: |
          pnpm --filter @agentra/presentation-author sandbox:install
          pnpm --filter @agentra/presentation-author sandbox:doctor
      - run: pnpm --filter ${{ matrix.workspace }} test

  storybook-build:
    name: storybook-build
    needs: [build-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: .
      - name: Extract package dist artifact
        run: tar -xzf packages-dist.tar.gz
      - run: pnpm --filter @agentra/frontend build-storybook
