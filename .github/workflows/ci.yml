name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome check .

  build-packages:
    name: build-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build agent-tools (includes shared via tsc -b project references)
        run: pnpm --filter @agentra/agent-tools build
      - name: Build presentation-author
        run: pnpm --filter @agentra/presentation-author build
      - name: Pack package dist artifact
        run: |
          tar -czf packages-dist.tar.gz \
            packages/shared/dist \
            packages/agent-tools/dist \
            packages/presentation-author/dist
      - uses: actions/upload-artifact@v4
        with:
          name: packages-dist
          path: packages-dist.tar.gz
          retention-days: 1

  typecheck:
    name: typecheck / ${{ matrix.workspace }}
    needs: [build-packages]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - '@agentra/shared'
          - '@agentra/agent-tools'
          - '@agentra/presentation-author'
          - '@agentra/frontend'
          - '@agentra/backend'
          - '@agentra/agentcore-runtime-ts'
          - '@agentra/presentation-author-runtime'
          - '@agentra/infra-cdk'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: .
      - name: Extract package dist artifact
        run: tar -xzf packages-dist.tar.gz
      - run: pnpm --filter ${{ matrix.workspace }} typecheck

  test:
    name: test / ${{ matrix.workspace }}
    needs: [build-packages]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: '@agentra/frontend'
            sandbox: false
          - workspace: '@agentra/agent-tools'
            sandbox: false
          - workspace: '@agentra/presentation-author'
            sandbox: true
          - workspace: '@agentra/backend'
            sandbox: false
          - workspace: '@agentra/agentcore-runtime-ts'
            sandbox: false
          - workspace: '@agentra/presentation-author-runtime'
            sandbox: true
          - workspace: '@agentra/infra-cdk'
            sandbox: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: .
      - name: Extract package dist artifact
        run: tar -xzf packages-dist.tar.gz
      - name: Install presentation-author sandbox runtime
        if: ${{ matrix.sandbox }}
        run: |
          pnpm --filter @agentra/presentation-author sandbox:install
          pnpm --filter @agentra/presentation-author sandbox:doctor
      - run: pnpm --filter ${{ matrix.workspace }} test

  storybook-build:
    name: storybook-build
    needs: [build-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: .
      - name: Extract package dist artifact
        run: tar -xzf packages-dist.tar.gz
      - name: Build Storybook
        run: pnpm --filter @agentra/frontend build-storybook
      - name: Install Playwright browsers for test-runner
        run: pnpm --filter @agentra/frontend playwright:install
      - name: Run Storybook interaction tests
        run: |
          pnpm --filter @agentra/frontend storybook:serve-static &
          pnpm --filter @agentra/frontend exec wait-on http://127.0.0.1:6006
          pnpm --filter @agentra/frontend test-storybook:ci

  cdk-synth:
    name: cdk-synth
    needs: [build-packages]
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: .
      - name: Extract package dist artifact
        run: tar -xzf packages-dist.tar.gz
      - name: Synth CDK stacks (validate CloudFormation templates)
        run: pnpm --filter @agentra/infra-cdk synth:ci

  frontend-visual-evidence:
    name: frontend-visual-evidence
    needs: [build-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: packages-dist
          path: .
      - name: Extract package dist artifact
        run: tar -xzf packages-dist.tar.gz
      - name: Install Playwright browsers
        run: pnpm --filter @agentra/frontend playwright:install
      - name: Run frontend visual evidence
        run: pnpm test:frontend:visual-evidence
        env:
          NEXT_PUBLIC_API_MODE: mock
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-visual-evidence
          path: |
            apps/frontend/test-results/
            apps/frontend/playwright-report/
          retention-days: 14
          if-no-files-found: warn
